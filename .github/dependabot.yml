version: 2
updates:
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - gradle
    commit-message:
      prefix: deps
      include: scope
    groups:
      androidx:
        patterns:
          - "androidx.*"
      compose:
        patterns:
          - "androidx.compose.*"
      camerax:
        patterns:
          - "androidx.camera:*"
      firebase:
        patterns:
          - "com.google.firebase:*"
          - "com.google.gms:*"
      coil:
        patterns:
          - "io.coil-kt:*"
      okhttp:
        patterns:
          - "com.squareup.okhttp3:*"
      kotlin:
        patterns:
          - "org.jetbrains.kotlin*"
          - "org.jetbrains.kotlinx:*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
      include: scope
    ignore:
      # gradle/actions v5+ moves caching into a non-OSS component under
      # Gradle's commercial Terms of Use. Pin to v4 to stay fully Apache 2.0.
      - dependency-name: gradle/actions
        versions: [">=5"]
